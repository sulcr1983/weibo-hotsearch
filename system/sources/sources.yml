# 汽车行业舆情监控 V5 — 数据源统一配置
# 非AI优先：RSS + Web(HTTP) → 仅极少数源用 Playwright/AI兜底

rss_feeds:
  # ── 直接 RSS ──
  - name: 36氪
    url: https://36kr.com/feed
    level: 3
  - name: 钛媒体
    url: https://www.tmtpost.com/feed
    level: 3
  - name: 极客公园
    url: https://www.geekpark.net/rss
    level: 3

  # ── RSSHub Level 2：财经/综合 ──
  - name: 第一财经快讯
    url: "{RSSHUB_HOST}/yicai/brief"
    level: 2
  - name: 财联社热门
    url: "{RSSHUB_HOST}/cls/hot"
    level: 2
  - name: 财联社深度
    url: "{RSSHUB_HOST}/cls/depth"
    level: 2
  - name: 华尔街见闻
    url: "{RSSHUB_HOST}/wallstreetcn/news/global"
    level: 2
  - name: 澎湃新闻精选
    url: "{RSSHUB_HOST}/thepaper/featured"
    level: 2
  - name: 财新最新
    url: "{RSSHUB_HOST}/caixin/latest"
    level: 2

  # ── RSSHub Level 3：科技/新媒体 ──
  - name: 36氪快讯
    url: "{RSSHUB_HOST}/36kr/newsflashes"
    level: 3
  - name: 虎嗅
    url: "{RSSHUB_HOST}/huxiu/article"
    level: 3
  - name: 知乎日报
    url: "{RSSHUB_HOST}/zhihu/daily"
    level: 3

web_feeds:
  # ── Level 1：国家级权威媒体 API ──
  - name: 央视新闻
    url: https://news.cctv.com/2019/07/gaiban/cmsdatainterface/page/news_1.jsonp
    level: 1
    method: api
    api_config:
      item_path: data.list
      title_key: title
      link_key: url
      time_key: focus_date
      summary_key: brief
      jsonp: news

  # ── Level 2：门户/财经 API ──
  - name: 新浪汽车
    url: https://feed.mix.sina.com.cn/api/roll/get?pageid=153&lid=2509&num=20
    level: 2
    method: api
    api_config:
      item_path: result.data
      title_key: title
      link_key: url
      time_key: ctime

  - name: 新浪财经
    url: https://feed.mix.sina.com.cn/api/roll/get?pageid=153&lid=2516&num=20
    level: 2
    method: api
    api_config:
      item_path: result.data
      title_key: title
      link_key: url
      time_key: ctime

  - name: IT之家
    url: https://m.ithome.com/api/news/newslistpageget?page=1&type=0
    level: 3
    method: api
    api_config:
      item_path: Result
      title_key: title
      link_key: url
      link_prefix: https://www.ithome.com
      time_key: postdate
      summary_key: description

  - name: 搜狐新闻
    url: https://v2.sohu.com/public-api/feed?scene=CHANNEL&sceneId=15&page=1&size=20
    level: 2
    method: api
    api_config:
      item_path: _

  # ── Level 2：HTML 直采（已修复反爬 — 用现代UA+SSL跳过）──
  - name: 搜狐汽车
    url: https://auto.sohu.com/
    level: 2
    method: html
    selectors:
      article: a[href]
    max_items: 20

  - name: 腾讯汽车
    url: https://new.qq.com/ch/auto/
    level: 2
    method: html
    selectors:
      article: a[href]
    max_items: 15

  - name: 太平洋汽车网
    url: https://www.pcauto.com.cn/news/
    level: 2
    method: html
    selectors:
      article: a[href]
    max_items: 15

  - name: 汽车之家
    url: https://m.autohome.com.cn/
    level: 2
    method: html
    selectors:
      article: a[href]
    max_items: 15

  - name: 懂车帝
    url: https://www.dongchedi.com/
    level: 2
    method: html
    selectors:
      article: a[href]
    max_items: 15

  - name: 易车网
    url: https://news.yiche.com/
    level: 2
    method: html
    selectors:
      article: a[href]
    max_items: 15

  - name: 爱卡汽车
    url: https://info.xcar.com.cn/list/
    level: 2
    method: html
    selectors:
      article: a[href]
    max_items: 15

  - name: 盖世汽车
    url: https://m.gasgoo.com/
    level: 2
    method: html
    selectors:
      article: a[href]
    max_items: 15

  - name: 电车之家
    url: https://www.diandong.com/news/
