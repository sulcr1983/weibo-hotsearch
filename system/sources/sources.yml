    method: html
    selectors:
      article: a[href]
    max_items: 15

  - name: 央视汽车
    url: https://auto.cctv.com/
    level: 1
    method: html
    selectors:
      article: a[href]
    max_items: 15

  - name: 新华网汽车
    url: http://www.xinhuanet.com/auto/
